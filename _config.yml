title: Michael Kato
description: Technical artist portfolio and blog posts.
timezone: America/Los_Angeles
url: https://michael-kato.github.io
baseurl: /portfolio
markdown: kramdown
kramdown:
  input: GFM
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      header_title: Michael Kato
      header_subtitle: blogs
      header_link: /
      blog_link: /blog/
      back_label: "&larr; Back to blogs"
      permalink: /blog/:title/
exclude:
  - README.md
  - CLAUDE.md
  - .codex
