<div class="single-video">
  {% if include.caption %}
    <p class="media-caption">{{ include.caption }}</p>
  {% endif %}
  <video controls{% if include.autoplay %} autoplay{% endif %}{% if include.muted %} muted{% endif %}{% if include.loop %} loop{% endif %}{% if include.playsinline %} playsinline{% endif %}{% if include.poster %} poster="{{ include.poster | relative_url }}"{% endif %}{% if include.volume %} data-default-volume="{{ include.volume }}"{% endif %}>
    <source src="{{ include.src | relative_url }}" type="{{ include.type | default: 'video/mp4' }}">
    Your browser does not support the video tag.
  </video>
</div>
