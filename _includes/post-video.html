<div class="single-video">
  {% if include.caption %}
    <p class="media-caption">{{ include.caption }}</p>
  {% endif %}
  <video controls{% if include.volume %} data-default-volume="{{ include.volume }}"{% endif %}>
    <source src="{{ include.src }}" type="{{ include.type | default: 'video/mp4' }}">
    Your browser does not support the video tag.
  </video>
</div>
